name: lean_unified

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/ci/install_lean.sh
      - run: bash tools/ci/capture_env.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ci-env
          path: ci-artifacts/
      - run: source "$HOME/.elan/env" && lake update
      - run: source "$HOME/.elan/env" && lake build
