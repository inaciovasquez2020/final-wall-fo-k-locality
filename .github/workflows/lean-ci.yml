name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean toolchain (retry hardened)
        run: |
          set -e
          for i in 1 2 3 4 5; do
            curl -L https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y && break
            echo "Retry elan install $i"
            sleep 15
          done
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Show Lean version
        run: lean --version

      - name: Lake update
        run: lake update

      - name: Try mathlib cache (non-fatal)
        run: lake exe cache get || true

      - name: Build
        run: lake build
