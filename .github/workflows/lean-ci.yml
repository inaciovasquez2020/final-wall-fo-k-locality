name: Lean CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lean-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .
          use-mathlib-cache: true

      - name: Build URF (includes regression checks)
        run: |
          lake update
          lake build

