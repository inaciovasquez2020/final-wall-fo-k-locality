name: External Monitor (Scheduled verify latest tag)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Merkle root and Lean build attestations
        run: |
          set -euo pipefail

          # Verify transparency Merkle root (repo root paths)
          calc=$(sha256sum transparency/files.sha256 | awk '{print $1}')
          exp=$(cat transparency/merkle.root)
          [ "$calc" = "$exp" ]

          # Verify Lean build attestation
          calc2=$(sha256sum lean-attest/LEAN_BUILD_ATTEST.txt | awk '{print $1}')
          exp2=$(cat lean-attest/LEAN_BUILD_ATTEST.sha256)
          [ "$calc2" = "$exp2" ]

          echo "External monitor verification passed"

