name: No Duplicate Namespace Check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect duplicate namespaces (file-level)
        run: |
          dup=$(grep -R '^[[:space:]]*namespace[[:space:]]\+' lean 2>/dev/null \
            | awk -F: '{print $2}' \
            | awk '{print $2}' \
            | sort | uniq -c | awk '$1>1 {print $2}')
          if [ -n "$dup" ]; then
            echo "Duplicate namespaces found:"
            echo "$dup"
            exit 1
          fi
      - name: Lake update
        run: lake update
      - name: Build
        run: lake build
