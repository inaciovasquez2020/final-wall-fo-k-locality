name: pdf-verify

on:
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX (manual verification only)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-pictures \
            latexmk

      - name: Sanity checks (manual)
        run: |
          set -euo pipefail
          test -f README.md
          test -f STATUS.md
          test -f FREEZE.md
          test -f trw-erb-sigc.tex
          test -f CITATION.cff
          echo "PDF verify sanity (manual) passed"

